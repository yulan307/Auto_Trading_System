name: Manual Repository Checks

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        required: false
        default: "3.12"
      run-tests:
        description: Run pytest suite
        required: false
        default: "true"
      run-init-db:
        description: Run init_db smoke check
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  repository-layout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository layout
        run: |
          test -d .github
          test -d app
          test -d backup
          test -d config
          test -d data
          test -d docs
          test -d logs
          test -d scripts
          test -d tests
          test -f README.md
          test -f requirements.txt
          test -f .github/workflows/manual-checks.yml
          test -f docs/system_design.md
          test -f docs/changelog.md

  python-checks:
    needs: repository-layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.12' }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run init_db smoke check
        if: ${{ github.event.inputs.run-init-db != 'false' }}
        run: python scripts/init_db.py --config config/backtest.yaml

      - name: Run tests
        if: ${{ github.event.inputs.run-tests != 'false' }}
        run: python -m pytest -q
